name: SQL Tests

on:
  push:
    paths:
      - "src/sql/**"
      - "public/data/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas duckdb
      - run: python scripts/test_queries.py
