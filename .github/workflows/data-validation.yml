name: Data Validation

on:
  push:
    paths:
      - "public/data/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas duckdb
      - run: python scripts/validate_data.py
